@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap');

:root{
  --bg:#F2F4F7;--s1:#FFFFFF;--s2:#F8F9FB;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.04);
  --text:#111827;--muted:#9CA3AF;--sub:#C4C9D4;
  --up:#16A34A;--down:#DC2626;--warn:#D97706;
  --up-bg:rgba(22,163,74,.10);--down-bg:rgba(220,38,38,.08);
  --hs:#E8500A;--vo:#0D9488;--mo:#CA8A04;
  --tt:#059669;--jd:#E11D48;--cp:#7C3AED;
  --acum:#2563EB;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.05);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:15.4px;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:680px;margin:0 auto;padding:16px 8px 28px;overflow:hidden;}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.logo-img{height:46px;object-fit:contain;}
.week-nav{display:flex;align-items:center;gap:8px;}
.nav-btn{
  background:var(--s1);border:1px solid var(--border);color:#6B7280;
  width:38px;height:38px;border-radius:50%;font-size:1.05rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);transition:all .15s;font-weight:600;
}
.nav-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}
.nav-btn:disabled{opacity:.2;cursor:default;pointer-events:none;}
.week-info{text-align:right;}
.week-label{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.week-dates{font-size:1.25rem;font-weight:800;margin-top:2px;color:var(--text);letter-spacing:-.5px;}

/* SECTION */
.sec{
  font-size:.62rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);margin:28px 0 12px;display:flex;align-items:center;gap:10px;
}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* TABLE CARD */
.tbl-wrap{
  overflow-x:hidden;-webkit-overflow-scrolling:touch;width:100%;
  background:var(--s1);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border2);
}
table.week{border-collapse:collapse;width:100%;table-layout:fixed;}
table.week thead tr.hg th{
  font-size:.52rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);padding:10px 2px 6px;text-align:center;
  border-bottom:1px solid var(--border);background:var(--s2);
  line-height:1.05;white-space:normal;
}
table.week thead tr.hg th:nth-child(n+3){
  height:54px;
  vertical-align:bottom;
  transform:rotate(-35deg);
  transform-origin:50% 85%;
  white-space:nowrap;
  padding-bottom:12px;
}
table.week thead tr.hg th:first-child{border-radius:var(--radius) 0 0 0;}
table.week thead tr.hg th.hl{color:var(--text);}
table.week thead tr.hd th{
  font-size:.54rem;font-weight:700;letter-spacing:.15px;text-transform:uppercase;
  color:var(--sub);padding:3px 1px 8px;text-align:center;background:var(--s2);
  line-height:1.05;white-space:nowrap;
}
table.week thead th:first-child{text-align:left;padding-left:10px;width:42px;}
table.week col.c-unit{width:42px;}
table.week col.c-day{width:7.0%;}
table.week col.c-total{width:8.1%;}
table.week col.c-acum{width:8.4%;}
table.week col.c-msem{width:8.0%;}
table.week col.c-mmes{width:8.1%;}
table.week col.c-pct{width:9.4%;}
.r-s td,.r-c td{
  text-align:center;font-family:'Inter',sans-serif;
  font-size:.66rem;padding:2px 1px;
  white-space:nowrap;
}
.r-s td:first-child{text-align:left;padding-left:8px;}
.r-c td:first-child{
  text-align:left;padding-left:13px;color:var(--text);
  font-size:.56rem;font-weight:700;
}
.r-s td{border-top:1px solid var(--border2);padding-top:9px;}
.r-c td{padding-bottom:8px;}

/* Unit */
.unit-name{display:flex;align-items:center;gap:4px;font-weight:800;font-size:.68rem;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.zero{color:var(--sub);}

/* Total column - cor da unidade */
.col-tot{font-weight:800;font-size:.68rem;padding:2px 1px!important;border-radius:6px;}
.col-tot.HS{color:var(--hs);background:rgba(232,80,10,.10);}
.col-tot.VO{color:var(--vo);background:rgba(13,148,136,.10);}
.col-tot.MO{color:var(--mo);background:rgba(202,138,4,.10);}
.col-tot.TT{color:var(--tt);background:rgba(5,150,105,.10);}
.col-tot.JD{color:var(--jd);background:rgba(225,29,72,.10);}
.col-tot.CP{color:var(--cp);background:rgba(124,58,237,.10);}
.col-tot.hit{color:var(--up)!important;background:var(--up-bg)!important;}
.col-tot.mis{color:var(--down)!important;background:var(--down-bg)!important;}
.col-tot.TOTAL{color:var(--text);}

/* Acum column - azul */
.col-acum{color:var(--acum);font-weight:800;font-size:.68rem;}
.col-acum.hit{color:var(--up)!important;background:var(--up-bg);border-radius:6px;padding:2px 1px!important;}
.col-acum.mis{color:var(--down)!important;background:var(--down-bg);border-radius:6px;padding:2px 1px!important;}
.col-msem{color:var(--sub);font-size:.57rem;font-weight:700;}
.col-mmes{color:var(--muted);font-size:.57rem;font-weight:700;}

/* % */
.pct{font-weight:800;font-size:.62rem;padding-left:0!important;padding-right:0!important;}
.pct.ok{color:var(--up);}
.pct.mid{color:var(--warn);}
.pct.low{color:var(--down);}

/* Total row */
.total-row td{
  font-weight:800;
  color:inherit;
  font-size:.67rem;
  border-top:2px solid var(--border)!important;
  padding-top:9px!important;
  background:transparent!important;
}
.total-row td:first-child span{color:var(--muted)!important;}
.total-row .col-tot.hit{color:var(--up)!important;background:var(--up-bg)!important;}
.total-row .col-tot.mis{color:var(--down)!important;background:var(--down-bg)!important;}
.total-row .col-acum{color:var(--acum)!important;background:transparent!important;}
.total-row .col-msem{color:var(--sub)!important;background:transparent!important;}
.total-row .col-mmes{color:var(--muted)!important;background:transparent!important;}
.total-row .pct.ok{color:var(--up)!important;}
.total-row .pct.mid{color:var(--warn)!important;}
.total-row .pct.low{color:var(--down)!important;}
.r-c td,.r-c .zero,.r-c .col-tot,.r-c .col-acum{color:var(--text)!important;}
.r-c td:not(:first-child){font-weight:600;}

/* RECORDS */
.records{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.rec-card{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:var(--radius);padding:22px 18px;text-align:center;
  box-shadow:var(--shadow-sm);
}
.rec-card:nth-child(1){background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.12);}
.rec-card:nth-child(2){background:rgba(5,150,105,.06);border-color:rgba(5,150,105,.12);}
.rec-card:nth-child(3){background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.12);}
.rec-val{
  font-family:'Bebas Neue',sans-serif;font-size:3rem;
  line-height:1;letter-spacing:2px;
}
.rec-card:nth-child(1) .rec-val{color:#2563EB;}
.rec-card:nth-child(2) .rec-val{color:#059669;}
.rec-card:nth-child(3) .rec-val{color:#7C3AED;}
.rec-lbl{
  font-size:.58rem;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted);margin-top:6px;
}
.rec-sub{font-size:.68rem;color:var(--sub);margin-top:3px;font-weight:500;}

/* HEATMAP */
.hm-wrap{
  overflow-x:hidden;-webkit-overflow-scrolling:touch;
  background:var(--s1);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border2);padding:16px 10px;
}
table.hm{border-collapse:collapse;width:100%;table-layout:fixed;}
.hm-th-mes{
  font-size:.64rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--muted);text-align:left;padding:0 8px 14px 0;min-width:36px;
}
.hm-th-unit{
  font-size:.57rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  text-align:center;padding:0 1px 12px;min-width:36px;
}
.hm-th-geral{
  font-size:.57rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  text-align:center;padding:0 1px 12px;min-width:36px;color:var(--muted);
  border-left:2px solid var(--border);
}
.hm-td-mes{
  font-size:.74rem;font-weight:600;color:var(--muted);
  padding:4px 8px 4px 0;vertical-align:middle;white-space:nowrap;
}
.hm-td-mes.cur{color:var(--text);font-weight:700;}
.hm-cell{text-align:center;padding:4px 3px;vertical-align:middle;}
.hm-cell-g{text-align:center;padding:4px 3px;vertical-align:middle;border-left:2px solid var(--border);}
.pip{
  display:inline-flex;align-items:center;justify-content:center;
  width:31px;height:29px;border-radius:9px;font-size:.72rem;
}
.pip.hit{background:rgba(22,163,74,.10);color:#16A34A;border:1px solid rgba(22,163,74,.18);}
.pip.miss{background:rgba(220,38,38,.08);color:#DC2626;font-size:.82rem;font-weight:800;border:1px solid rgba(220,38,38,.15);}
.pip.cur{background:var(--s2);color:var(--sub);font-size:.65rem;border:1px dashed var(--border);}
.pip.fut{background:transparent;color:transparent;border:none;}
.tr-pct td{border-top:2px solid var(--border);padding-top:12px;}
.hm-pct-lbl{
  font-size:.5rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--sub);padding-top:12px;white-space:nowrap;padding-right:8px;line-height:1.6;
}
.hm-td-pct{text-align:center;padding:10px 3px 4px;}
.hm-td-pct-g{text-align:center;padding:10px 3px 4px;border-left:2px solid var(--border);}
.pv{font-weight:800;font-size:.66rem;}
.pv.ok{color:var(--up);}.pv.mid{color:var(--warn);}.pv.low{color:var(--down);}

#ds{text-align:center;font-size:.62rem;margin-top:10px;cursor:pointer;font-weight:500;}
footer{text-align:center;margin-top:8px;font-size:.62rem;color:var(--sub);font-weight:500;}

@keyframes spin{to{transform:rotate(360deg)}}
#lo{
  display:flex;position:fixed;inset:0;z-index:9999;
  background:rgba(242,244,247,.97);flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
}
.spin{width:40px;height:40px;border:3px solid rgba(0,0,0,.08);border-top-color:#E8500A;border-radius:50%;animation:spin .8s linear infinite;}
#lm{font-size:.75rem;color:var(--muted);font-family:'Inter',sans-serif;letter-spacing:.5px;text-align:center;padding:0 32px;font-weight:500;}
</style>
</head>

function formatarDataBR(valor){
  const opcoes={day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZone:'America/Sao_Paulo'};

  if(!valor){
    return new Date().toLocaleString('pt-BR',opcoes);
  }

  try{
    let texto=String(valor).trim();

    // O Office Script pode devolver data em formato americano sem fuso, ex: 5/19/2026, 6:14:28 PM.
    // Nesse caso tratamos como UTC e exibimos em horário de São Paulo.
    if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(texto) && !/(Z|GMT|UTC|[+-]\d{2}:?\d{2})$/i.test(texto)){
      texto += ' UTC';
    }

    const data=new Date(texto);
    if(!isNaN(data.getTime())){
      return data.toLocaleString('pt-BR',opcoes);
    }
  }catch(e){}

  return new Date().toLocaleString('pt-BR',opcoes);
}

function parseRSBlock(values, dateRow, dataRow){

    if(!serial||isNaN(serial)) return null;
    // Usa UTC para evitar problema de timezone (Brasília = UTC-3)
    const ms=Math.round((serial-25569)*86400*1000);
    const d=new Date(ms);
    // Extrai data em UTC
    const y=d.getUTCFullYear(),mo=d.getUTCMonth(),day=d.getUTCDate();
    return new Date(y,mo,day); // cria como local sem conversão
  }
  const dataIni=toDate(dates[2]);
  const dataFim=toDate(dates[8]);

  const semId=seg.getFullYear()*100+week;
  
  // unit order: HS=0, VO=2, CP=4, MO=6, TT=8, JD=10

  const fatTicketColIdx={HS:4,VO:3,MO:2,TT:5,JD:6,CP:7};
  unitMap.forEach(([u,off])=>{
    const sr=values[dataRow+off]||[];
    const cr=values[dataRow+off+1]||[];
    const iv=v=>{try{return parseInt(v)||0;}catch{return 0;}};
    const fv=v=>{try{const n=parseFloat(v);return n>0?n:0;}catch{return 0;}};
    const fv2=v=>{try{const n=parseFloat(String(v).replace(/[^0-9.,]/g,'').replace(',','.'));return n>0?n:0;}catch{return 0;}};
    const s=[2,3,4,5,6,7,8].map(i=>iv(sr[i]));
    const c=[2,3,4,5,6,7,8].map(i=>iv(cr[i]));
    const tot=iv(sr[9])||s.reduce((a,b)=>a+b,0);
    const tot_c=iv(cr[9]);
    const acum=iv(sr[10]);
    const acum_c=iv(cr[10]);
    const colIdx=fatTicketColIdx[u]||4;
    const fatMetaRow=values[70+dataIni.getMonth()]||[];
    const ticketRow=values[86+dataIni.getMonth()]||[];
    const fatMeta=fv2(fatMetaRow[colIdx]);
    const ticket=fv2(ticketRow[colIdx]);
    const diasMes=new Date(ano,dataIni.getMonth()+1,0).getDate();
    const mm=fatMeta>0&&ticket>0?Math.round(fatMeta/ticket/4.8):0;
    const ms=mm>0?Math.round(mm/diasMes*7):0;
    const pct=mm>0?Math.round(acum/mm*1000)/10:0;
    result[u]={s,c,tot,tot_c,acum,acum_c,ms,mm:Math.round(mm),pct};
  });
  return{semId,result};
}

function unitDefault(){
  return {s:[0,0,0,0,0,0,0],c:[0,0,0,0,0,0,0],tot:0,tot_c:0,acum:0,acum_c:0,ms:0,mm:0,pct:0};
}

function normalizeUnit(u){
  const d=unitDefault();
  if(!u || typeof u!=='object') return d;
  d.s=Array.isArray(u.s)?u.s.map(x=>parseInt(x)||0):d.s;
  d.c=Array.isArray(u.c)?u.c.map(x=>parseInt(x)||0):d.c;
  d.tot=parseInt(u.tot ?? u.total ?? d.s.reduce((a,b)=>a+b,0))||0;
  d.tot_c=parseInt(u.tot_c ?? u.total_corp ?? u.corp ?? d.c.reduce((a,b)=>a+b,0))||0;
  d.acum=parseInt(u.acum ?? u.acumulado ?? 0)||0;
  d.acum_c=parseInt(u.acum_c ?? u.acumulado_corp ?? 0)||0;
  d.ms=parseFloat(u.ms ?? u.meta_semana ?? u.metaSemanal ?? 0)||0;
  d.mm=parseFloat(u.mm ?? u.meta_mes ?? u.metaMensal ?? 0)||0;
  d.pct=parseFloat(u.pct ?? u.percentual ?? (d.mm>0 ? d.acum/d.mm*100 : 0))||0;
  return d;
}

function normalizeSemana(item){
  if(!item || typeof item!=='object') return null;
  const meta=item._meta || item.meta || item;
  const sid=parseInt(meta.sid ?? item.sid ?? item.semId ?? item.semanaId ?? item.id);
  if(!sid) return null;
  const result={_meta:{
    ini:meta.ini || meta.inicio || meta.dataInicio || '—',
    fim:meta.fim || meta.final || meta.dataFim || '—',
    mes:meta.mes || '',
    ano:parseInt(meta.ano)||parseInt(String(sid).slice(0,4))||new Date().getFullYear(),
    sid
  }};
  const unidades=item.unidades || item.units || item;
  UNIT_CFG.forEach(u=>{result[u.code]=normalizeUnit(unidades[u.code]);});
  return {semId:sid,result};
}

function applyDashboardData(data){
  if(!data || typeof data!=='object') return false;
  let updated=false;

  if(data.WD && typeof data.WD==='object'){
    window.WD=data.WD;
    window.WI=Array.isArray(data.WI)?data.WI.map(Number).sort((a,b)=>a-b):Object.keys(data.WD).map(Number).filter(Boolean).sort((a,b)=>a-b);
    updated=true;
  }

  const semanasFonte=data.semanas || data.weeks;
  const semanasArray=Array.isArray(semanasFonte)
    ? semanasFonte
    : (semanasFonte && typeof semanasFonte==='object' ? Object.values(semanasFonte) : []);

  semanasArray.forEach(item=>{
    const b=normalizeSemana(item);
    if(b){
      window.WD[String(b.semId)]=b.result;
      if(!window.WI.includes(b.semId)) window.WI.push(b.semId);
      updated=true;
    }
  });

  if(data.metasAcmp && typeof data.metasAcmp==='object'){
    Object.assign(METAS_ACMP,data.metasAcmp);
    updated=true;
  }

  if(Array.isArray(data.metas) && data.metas.length){
    const anoAtual=new Date().getFullYear();
    if(!METAS_ACMP[anoAtual]) METAS_ACMP[anoAtual]=[];
    data.metas.forEach((m,i)=>{
      if(m && typeof m==='object') METAS_ACMP[anoAtual][i]=Object.assign(METAS_ACMP[anoAtual][i]||{},m);
    });
    updated=true;
  }

  if(data.pctAno && typeof data.pctAno==='object'){
    Object.assign(PCT_ANO,data.pctAno);
    updated=true;
  }

  if(data.percentualAno && typeof data.percentualAno==='object'){
    Object.assign(PCT_ANO,data.percentualAno);
    updated=true;
  }

  if(updated){
    window.WI=[...new Set(window.WI.map(Number).filter(Boolean))].sort((a,b)=>a-b);
    const tSid=getSemanaId(new Date());
    currentIdx=window.WI.includes(tSid)?window.WI.indexOf(tSid):window.WI.length-1;
    render(currentIdx);
  }
  return updated;
}

async function fetchFreshData(){
  const ds=document.getElementById('ds');
  ds.textContent='atualizando...';
  ds.style.color='#D97706';
  ds.onclick=null;

  try{
    const url=`${DATA_URL}?v=${Date.now()}`;
    const resp=await fetch(url,{cache:'no-store'});
    if(!resp.ok) throw new Error(`dados.json: ${resp.status}`);
    const data=await resp.json();
    const ok=applyDashboardData(data);
    const stamp=formatarDataBR(data.atualizadoEm || data.updatedAt);

    // Quando o dados.json ainda está em modo teste/vazio, mantém os dados estáticos do painel.
    // Isso evita mensagem de erro falsa enquanto o Power Automate/GitHub Actions ainda não alimentou o arquivo.
    const semanasVazias=Array.isArray(data.semanas) && data.semanas.length===0;
    const metasVazias=Array.isArray(data.metas) && data.metas.length===0;
    const jsonTeste=String(data.status||'').toLowerCase()==='teste';
    const jsonVazio=jsonTeste || (semanasVazias && metasVazias && !data.WD && !data.weeks);

    if(ok){
      // Mostra o horário da última leitura bem-sucedida do app, em São Paulo.
      // Assim o rodapé muda a cada ciclo de atualização, mesmo quando os dados do Excel ainda não mudaram.
      const leitura=formatarDataBR();
      ds.textContent=`Dados atualizados · ${leitura}`;
      ds.style.color='var(--up)';
    }else if(jsonVazio){
      ds.textContent='dados.json conectado · aguardando dados do Power Automate';
      ds.style.color='var(--warn)';
    }else{
      ds.textContent='dados.json recebido · estrutura ainda não reconhecida';
      ds.style.color='var(--warn)';
    }
  }catch(err){
    console.error(err);
    ds.textContent=`erro dados.json · ${err.message}`;
    ds.style.color='var(--down)';
    ds.onclick=()=>alert('Erro ao carregar dados.json: '+err.message);
  }
}

// Nav
document.getElementById('btn-prev').onclick=()=>{if(currentIdx>0){currentIdx--;render(currentIdx);}};
document.getElementById('btn-next').onclick=()=>{if(currentIdx<window.WI.length-1){currentIdx++;render(currentIdx);}};

// Init
const tSid=getSemanaId(new Date());
if(!window.WI.includes(tSid)){
  window.WI=[...window.WI,tSid].sort((a,b)=>a-b);
  const now=new Date(),dow=now.getDay(),diff=dow===0?-6:1-dow;
  const seg=new Date(now); seg.setDate(now.getDate()+diff);
  const dom=new Date(seg); dom.setDate(seg.getDate()+6);
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const mesL=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][seg.getMonth()];
  window.WD[String(tSid)]={_meta:{ini:fmt(seg),fim:fmt(dom),mes:mesL,ano:seg.getFullYear(),sid:tSid}};
}
currentIdx=window.WI.indexOf(tSid);
if(currentIdx<0) currentIdx=window.WI.length-1;
document.getElementById('lo').style.display='none';
render(currentIdx);
fetchFreshData();
setInterval(fetchFreshData,60000);
</script>
