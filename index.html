<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escape60">
<meta name="theme-color" content="#0A0A0F">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0F;--s1:#13131A;--border:rgba(255,255,255,0.07);
    --text:#EEEEF5;--muted:#55556E;--up:#3DD68C;--down:#FF4D6D;--warn:#FFD166;
    --hs:#FF6B35;--vo:#4ECDC4;--mo:#FFD166;--tt:#A8E6CF;--jd:#FF8B94;--cp:#C3B1E1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden;max-width:100%;}
  .wrap{max-width:520px;margin:0 auto;padding:18px 14px 36px;overflow-x:hidden;}

  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .logo-img{height:40px;object-fit:contain;}
  .week-nav{display:flex;align-items:center;gap:6px;}
  .nav-btn{background:var(--s1);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .nav-btn:disabled{opacity:.2;cursor:default;}
  .week-info{text-align:right;}
  .week-label{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .week-dates{font-family:'DM Mono',monospace;font-size:.78rem;margin-top:1px;}

  .sec{font-size:.55rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
  .sec::after{content:'';flex:1;height:1px;background:var(--border);}

  /* TABLE */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;}
  table.week{border-collapse:collapse;width:100%;}
  table.week thead tr.hg th{font-size:.52rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0 4px;text-align:center;border-bottom:1px solid var(--border);}
  table.week thead tr.hg th.hl{color:var(--text);}
  table.week thead tr.hd th{font-size:.52rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:5px 3px 8px;text-align:center;}
  table.week thead th:first-child{text-align:left;padding-left:2px;width:36px;}
  .r-s td,.r-c td{text-align:center;font-family:'DM Mono',monospace;font-size:.73rem;padding:2px 3px;}
  .r-s td:first-child{text-align:left;padding-left:2px;}
  .r-c td:first-child{text-align:left;padding-left:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.6rem;}
  .r-s td{border-top:1px solid var(--border);padding-top:9px;}
  .r-c td{padding-bottom:7px;}
  .col-tot{font-weight:700;padding:2px 4px!important;border-left:1px solid rgba(255,255,255,.08);}
  .col-acum{font-weight:500;padding:2px 4px!important;border-right:1px solid rgba(255,255,255,.08);}
  .col-tot.hit{background:rgba(61,214,140,.12);color:#3DD68C;}
  .col-tot.mis{background:rgba(255,77,109,.10);color:#FF6B7A;}
  .col-acum.hit{background:rgba(61,214,140,.09);color:#3DD68C;}
  .col-acum.mis{background:rgba(255,77,109,.08);color:#FF6B7A;}
  .col-msem{color:var(--muted);font-size:.68rem;}.col-mmes{color:var(--muted);font-size:.68rem;}
  .pct{font-weight:700;font-size:.78rem;}
  .pct.ok{color:var(--up);}.pct.mid{color:var(--warn);}.pct.low{color:var(--down);}
  .unit-name{display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.8rem;}
  .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .zero{color:var(--muted);}

  /* CHART */
  .chart-legend{display:flex;gap:14px;margin-bottom:10px;font-size:.6rem;font-family:'DM Mono',monospace;color:var(--muted);}
  .leg{display:flex;align-items:center;gap:5px;}
  .leg-sw{width:16px;height:4px;border-radius:2px;}
  .chart{display:flex;flex-direction:column;gap:9px;}
  .c-row{display:grid;grid-template-columns:30px 1fr 52px;align-items:center;gap:8px;}
  .c-label{display:flex;align-items:center;gap:4px;font-weight:600;font-size:.72rem;}
  .c-bars{position:relative;height:26px;background:var(--s1);border-radius:4px;overflow:hidden;}
  .bar-curr{position:absolute;top:2px;height:10px;border-radius:2px;}
  .bar-prev{position:absolute;top:14px;height:10px;border-radius:2px;opacity:.28;background:#fff!important;}
  .c-vals{text-align:right;font-family:'DM Mono',monospace;font-size:.68rem;line-height:1.6;}
  .c-curr{color:var(--text);}.c-prev{color:var(--muted);}

  /* RECORDS */
  .records{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .rec-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;}
  .rec-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
  .rec-lbl{font-size:.55rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .rec-sub{font-size:.6rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}

  /* HEATMAP */
  .hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.hm{border-collapse:collapse;width:100%;}
  .hm-th-mes{font-size:.55rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 6px 10px 0;min-width:32px;}
  .hm-th-unit{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:0 2px 10px;min-width:42px;}
  .hm-th-geral{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:0 2px 10px;min-width:42px;color:var(--muted);border-left:1px solid var(--border);}
  .hm-td-mes{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);padding:3px 6px 3px 0;vertical-align:middle;white-space:nowrap;}
  .hm-td-mes.cur{color:var(--text);font-weight:600;}
  .hm-cell{text-align:center;padding:3px 2px;vertical-align:middle;}
  .hm-cell-g{text-align:center;padding:3px 2px;vertical-align:middle;border-left:1px solid var(--border);}
  .pip{display:inline-flex;align-items:center;justify-content:center;width:36px;height:32px;border-radius:7px;font-size:.9rem;}
  .pip.hit{background:rgba(61,214,140,.15);color:var(--up);}
  .pip.miss{background:rgba(255,77,109,.10);color:rgba(255,77,109,.45);font-size:.72rem;font-weight:700;}
  .pip.cur{background:rgba(255,255,255,.04);color:var(--muted);font-size:.62rem;outline:1px dashed rgba(255,255,255,.1);outline-offset:2px;}
  .pip.fut{background:transparent;color:transparent;}
  .tr-pct td{border-top:1px solid var(--border);padding-top:10px;}
  .hm-pct-lbl{font-size:.52rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-top:10px;white-space:nowrap;padding-right:6px;}
  .hm-td-pct{text-align:center;padding:8px 2px 4px;}
  .hm-td-pct-g{text-align:center;padding:8px 2px 4px;border-left:1px solid var(--border);}
  .pv{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:700;}
  .pv.ok{color:var(--up);}.pv.mid{color:var(--warn);}.pv.low{color:var(--down);}

  /* LOADING */
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading-overlay{display:flex;position:fixed;inset:0;z-index:9999;background:rgba(10,10,15,.96);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite;}
  #loading-msg{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-align:center;padding:0 32px;}

  footer{text-align:center;margin-top:28px;font-size:.58rem;color:var(--muted);font-family:'DM Mono',monospace;}
</style>
</head>

  {code:'HS',color:'var(--hs)'},{code:'VO',color:'var(--vo)'},{code:'MO',color:'var(--mo)'},
  {code:'TT',color:'var(--tt)'},{code:'JD',color:'var(--jd)'},{code:'CP',color:'var(--cp)'},
];

const METAS_ACMP = {
  2026:[
    {l:'Jan',cur:false,HS:1,VO:0,MO:0,TT:1,JD:1,CP:1,G:1},
    {l:'Fev',cur:false,HS:1,VO:0,MO:0,TT:1,JD:1,CP:1,G:0},
    {l:'Mar',cur:false,HS:1,VO:0,MO:0,TT:1,JD:0,CP:1,G:0},
    {l:'Abr',cur:false,HS:0,VO:0,MO:0,TT:0,JD:0,CP:0,G:0},
    {l:'Mai',cur:true, HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Jun',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Jul',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Ago',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Set',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Out',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Nov',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
    {l:'Dez',cur:false,HS:null,VO:null,MO:null,TT:null,JD:null,CP:null,G:null},
  ]
};
const PCT_ANO_2026 = {HS:28.7,VO:20.3,MO:23.4,TT:29.7,JD:24.2,CP:30.7,G:26.1};

function pctClass(p){return p>=90?'ok':p>=60?'mid':'low';}
function pvClass(p) {return p>=33?'ok':p>=20?'mid':'low';}

function getSemanaId(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  const jan1=new Date(d.getFullYear(),0,1);
  const week=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return d.getFullYear()*100+week;
}

function nearestSid(targetSid){
  if(!window.WEEKS_IDS||!window.WEEKS_IDS.length) return null;
  if(window.WEEKS_IDS.includes(targetSid)) return targetSid;
  for(let i=window.WEEKS_IDS.length-1;i>=0;i--){
    if(window.WEEKS_IDS[i]<=targetSid) return window.WEEKS_IDS[i];
  }
  return window.WEEKS_IDS[window.WEEKS_IDS.length-1];
}

let currentIdx = 0;

// Meta proporcional: meta_mes / dias_do_mes * dias_já_passados_no_mes
function metaProporcional(metaMes, meta) {
  const hoje = new Date();
  const ano  = meta.ano;
  const mes  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'].indexOf(meta.mes);
  const diasMes   = new Date(ano, mes+1, 0).getDate();
  // dias passados = fim da semana ou hoje (o que for menor)
  const fimSemana = meta.fim; // "dd/mm"
  const [d,mo]    = fimSemana.split('/').map(Number);
  const dataFim   = new Date(ano, mo-1, d);
  const dataHoje  = new Date();
  const dataRef   = dataFim < dataHoje ? dataFim : dataHoje;
  const diasPass  = dataRef.getDate();
  return Math.round(metaMes / diasMes * diasPass);
}

function render(idx){
  if(!window.WEEKS_IDS||!window.WEEKS_DATA) return;
  const sid = window.WEEKS_IDS[idx];
  const wd  = window.WEEKS_DATA[String(sid)];
  if(!wd) return;
  const m = wd['_meta'];

  const semNum = String(sid).slice(4);
  document.getElementById('week-label').textContent = `Semana ${semNum} · ${m.ano}`;
  document.getElementById('week-dates').textContent = `${m.ini} – ${m.fim}`;
  document.getElementById('mes-col').textContent = m.mes;
  document.getElementById('sec-chart').textContent = `Comparativo ${m.ano} vs ${m.ano-1}`;
  document.getElementById('ano-curr').textContent = m.ano;
  document.getElementById('ano-prev').textContent = m.ano-1;
  document.getElementById('ano-metas').textContent = m.ano;
  document.getElementById('btn-prev').disabled = (idx<=0);
  document.getElementById('btn-next').disabled = (idx>=window.WEEKS_IDS.length-1);

  // TABLE
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let tS=0,tA=0,tMm=0,tMs=0,tC=0,tAC=0;
  const daySums=Array(7).fill(0);
  const corpDaySums=Array(7).fill(0);

  UNIT_CFG.forEach(u=>{
    const ud = wd[u.code] || {s:[0,0,0,0,0,0,0],c:[0,0,0,0,0,0,0],tot:0,tot_c:0,acum:0,acum_c:0,ms:0,mm:0,pct:0,ant:0};
    ud.s.forEach((v,i)=>daySums[i]+=v);
    ud.c.forEach((v,i)=>corpDaySums[i]+=v);
    const sc = ud.s.map(v=>`<td class="${v===0?'zero':''}">${v||'–'}</td>`).join('');
    const cc = ud.c.map(v=>`<td class="${v===0?'zero':''}">${v||'–'}</td>`).join('');
    tS+=ud.tot; tA+=ud.acum; tMm+=ud.mm; tMs+=ud.ms; tC+=ud.tot_c; tAC+=ud.acum_c;
    const pct = ud.pct.toFixed(1);
    // Alert classes
    const totClass = ud.tot >= ud.ms ? 'hit' : 'mis';
    const acumClass = ud.acum >= metaProporcional(ud.mm, m) ? 'hit' : 'mis';
    tbody.innerHTML += `
      <tr class="r-s">
        <td><div class="unit-name"><span class="dot" style="background:${u.color}"></span>${u.code}</div></td>
        ${sc}
        <td class="col-tot ${totClass}">${ud.tot}</td>
        <td class="col-acum ${acumClass}">${ud.acum}</td>
        <td class="col-msem">${ud.ms}</td>
        <td class="col-mmes">${ud.mm}</td>
        <td class="pct ${pctClass(parseFloat(pct))}">${pct}%</td>
      </tr>
      <tr class="r-c">
        <td>corp.</td>${cc}
        <td class="zero col-tot">${ud.tot_c||'–'}</td>
        <td class="zero col-acum">${ud.acum_c||'–'}</td>
        <td></td><td></td><td></td>
      </tr>`;
  });

  const tPct = tMm > 0 ? (tA/tMm*100).toFixed(1) : '0.0';
  const tTotClass  = tMs > 0 ? (tS >= tMs ? 'hit' : 'mis') : '';
  const tAcumClass = tMm > 0 ? (tA >= metaProporcional(tMm, m) ? 'hit' : 'mis') : '';
  const dc = daySums.map(v=>`<td style="font-family:'DM Mono',monospace;font-size:.73rem;text-align:center;color:var(--muted)">${v}</td>`).join('');
  tbody.innerHTML += `
    <tr class="r-s" style="border-top:1px solid rgba(255,255,255,.15)">
      <td><span style="font-size:.68rem;font-weight:600;letter-spacing:1px;color:var(--muted)">TOTAL</span></td>
      ${dc}
      <td class="col-tot ${tTotClass}">${tS}</td><td class="col-acum ${tAcumClass}">${tA}</td>
      <td class="col-msem">${tMs.toFixed(0)}</td><td class="col-mmes">${tMm.toFixed(0)}</td>
      <td class="pct ${pctClass(parseFloat(tPct))}">${tPct}%</td>
    </tr>
    <tr class="r-c">
      <td>corp.</td>
      ${corpDaySums.map(v=>`<td class="zero">${v||'–'}</td>`).join('')}
      <td class="zero col-tot">${tC||'–'}</td>
      <td class="zero col-acum">${tAC||'–'}</td>
      <td></td><td></td><td></td>
    </tr>`;

  // CHART
  const maxV = Math.max(...UNIT_CFG.map(u=>Math.max(wd[u.code]?.tot||0,wd[u.code]?.ant||0)));
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  UNIT_CFG.forEach(u=>{
    const ud=wd[u.code]; if(!ud||ud.tot===0) return;
    chart.innerHTML += `
      <div class="c-row">
        <div class="c-label"><span class="dot" style="background:${u.color}"></span>${u.code}</div>
        <div class="c-bars">
          <div class="bar-curr" style="width:${Math.round(ud.tot/maxV*100)}%;background:${u.color}"></div>
          <div class="bar-prev" style="width:${Math.round(ud.ant/maxV*100)}%"></div>
        </div>
        <div class="c-vals"><div class="c-curr">${ud.tot}</div><div class="c-prev">${ud.ant}</div></div>
      </div>`;
  });

  // HEATMAP
  const ano = m.ano;
  const meses = METAS_ACMP[ano]||METAS_ACMP[2026];
  const pctAno = ano===2026?PCT_ANO_2026:{};
  const hm = document.getElementById('hm');

  let h=`<thead><tr><th class="hm-th-mes"></th>`;
  UNIT_CFG.forEach(u=>{h+=`<th class="hm-th-unit" style="color:${u.color}">${u.code}</th>`;});
  h+=`<th class="hm-th-geral">Geral</th></tr></thead>`;

  let b='<tbody>';
  meses.forEach(me=>{
    b+=`<tr><td class="hm-td-mes${me.cur?' cur':''}">${me.l}${me.cur?' ◂':''}</td>`;
    UNIT_CFG.forEach(u=>{
      const v=me[u.code];
      let cls,icon;
      if(v===1){cls='hit';icon='👍';}
      else if(v===0){cls='miss';icon='✗';}
      else if(me.cur){cls='cur';icon='…';}
      else{cls='fut';icon='';}
      b+=`<td class="hm-cell"><div class="pip ${cls}">${icon}</div></td>`;
    });
    const gv=me.G;
    let gc,gi;
    if(gv===1){gc='hit';gi='👍';}else if(gv===0){gc='miss';gi='✗';}else if(me.cur){gc='cur';gi='…';}else{gc='fut';gi='';}
    b+=`<td class="hm-cell-g"><div class="pip ${gc}">${gi}</div></td></tr>`;
  });

  b+=`<tr class="tr-pct"><td class="hm-pct-lbl">% ano</td>`;
  UNIT_CFG.forEach(u=>{
    const p=pctAno[u.code]||0;
    b+=`<td class="hm-td-pct"><span class="pv ${pvClass(p)}">${p}%</span><br><span style="font-size:.55rem;color:var(--muted);letter-spacing:1px;font-family:'DM Sans',sans-serif;font-weight:600">${u.code}</span></td>`;
  });
  const pg=pctAno.G||0;
  b+=`<td class="hm-td-pct-g"><span class="pv ${pvClass(pg)}">${pg}%</span><br><span style="font-size:.55rem;color:var(--muted);letter-spacing:1px;font-family:'DM Sans',sans-serif;font-weight:600">Geral</span></td>`;
  b+='</tr></tbody>';
  hm.innerHTML=h+b;

  document.getElementById('footer').innerHTML =
    new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    + ' &nbsp;·&nbsp; <span style="opacity:.45;font-style:italic">criado por VB</span>';
}

// Nav
document.getElementById('btn-prev').onclick=()=>{if(currentIdx>0){currentIdx--;render(currentIdx);}};
document.getElementById('btn-next').onclick=()=>{if(currentIdx<window.WEEKS_IDS.length-1){currentIdx++;render(currentIdx);}};

// Init: sempre abre na semana atual do calendário
const todaySid = getSemanaId(new Date());

// Se a semana atual não está nos dados, cria entrada vazia
if(!window.WEEKS_IDS.includes(todaySid)) {
  window.WEEKS_IDS = [...window.WEEKS_IDS, todaySid].sort((a,b)=>a-b);
  // Calcula datas da semana atual
  const now = new Date();
  const dow = now.getDay();
  const diff = dow===0?-6:1-dow;
  const seg = new Date(now); seg.setDate(now.getDate()+diff);
  const dom = new Date(seg); dom.setDate(seg.getDate()+6);
  const fmt = d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const mes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][seg.getMonth()];
  window.WEEKS_DATA[String(todaySid)] = {
    _meta:{ini:fmt(seg),fim:fmt(dom),mes,ano:seg.getFullYear(),sid:todaySid}
  };
}

currentIdx = window.WEEKS_IDS.indexOf(todaySid);
if(currentIdx<0) currentIdx = window.WEEKS_IDS.length-1;
document.getElementById('loading-overlay').style.display='none';
render(currentIdx);

// Indicador de fonte dos dados
const dataSourceEl = document.createElement('div');
dataSourceEl.id = 'data-source';
dataSourceEl.style.cssText = 'text-align:center;font-size:.58rem;color:var(--muted);font-family:"DM Mono",monospace;margin-top:8px;';
dataSourceEl.textContent = 'dados: planilha local';
document.getElementById('footer').parentNode.insertBefore(dataSourceEl, document.getElementById('footer'));

// Busca dados frescos do SharePoint ao abrir
async function fetchFreshData() {
  if(window.location.protocol !== 'https:') return;
  try {
    const s = document.createElement('script');
    s.src = 'https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js';
    await new Promise((res,rej)=>{s.onload=res;s.onerror=rej;document.head.appendChild(s);});

    const app = new msal.PublicClientApplication({
      auth:{
        clientId: CLIENT_ID,
        authority: `https://login.microsoftonline.com/${TENANT_ID}`,
        redirectUri: window.location.origin + window.location.pathname
      },
      cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}
    });
    await app.initialize();
    await app.handleRedirectPromise();

    let accounts = app.getAllAccounts();
    if(accounts.length === 0) {
      dataSourceEl.textContent = 'toque aqui para atualizar dados';
      dataSourceEl.style.cursor = 'pointer';
      dataSourceEl.style.color = '#FFD166';
      dataSourceEl.onclick = async () => {
        dataSourceEl.textContent = 'entrando...';
        await app.loginPopup({scopes: SCOPES});
        fetchFreshData();
      };
      return;
    }

    dataSourceEl.textContent = 'atualizando dados...';
    dataSourceEl.style.color = '#FFD166';

    const tokenRes = await app.acquireTokenSilent({scopes: SCOPES, account: accounts[0]});
    const token = tokenRes.accessToken;

    // Busca o driveItem da planilha
    const fileRes = await fetch(`https://graph.microsoft.com/v1.0/shares/${SHARE_ID}/driveItem`, {
      headers: {Authorization: `Bearer ${token}`}
    });
    if(!fileRes.ok) throw new Error(`driveItem: ${fileRes.status}`);
    const fileData = await fileRes.json();
    const driveId = fileData.parentReference.driveId;
    const itemId  = fileData.id;

    const units = ['HS','VO','MO','TT','JD','CP'];
    const metaFixa = {HS:802,VO:408,MO:507,TT:350,JD:348,CP:239};
    const allData = {};

    for(const code of units) {
      const sheetName = `BD - ${code}`;
      const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/workbook/worksheets('${sheetName}')/usedRange`;
      const res = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
      if(!res.ok) continue;
      const data = await res.json();
      const rows = data.values.slice(3); // pula cabeçalho

      // Agrupa por Semana_ID (col 6)
      const bySem = {};
      rows.forEach(r => {
        if(r[0] !== code) return;
        const sid = parseInt(r[6]);
        if(!sid || isNaN(sid)) return;
        if(!bySem[sid]) bySem[sid] = [];
        bySem[sid].push(r);
      });

      Object.entries(bySem).forEach(([sid, semRows]) => {
        const s = Array(7).fill(0);
        const c = Array(7).fill(0);
        semRows.forEach((r,i) => { if(i<7){s[i]=parseInt(r[3])||0; c[i]=parseInt(r[4])||0;} });

        // Converte serial Excel para data
        const toDate = serial => {
          const d = new Date(1899,11,30);
          d.setDate(d.getDate() + parseInt(serial));
          return d;
        };
        const dataIni = toDate(semRows[0][1]);
        const dataFim = toDate(semRows[semRows.length-1][1]);
        const mes = dataIni.getMonth();
        const ano = dataIni.getFullYear();
        const diasMes = new Date(ano, mes+1, 0).getDate();
        const mm = metaFixa[code];
        const ms = Math.round(mm/diasMes*7*10)/10;

        // Acumulado do mês
        const acum  = rows.filter(r => { const d=toDate(r[1]); return r[0]===code && d.getFullYear()===ano && d.getMonth()===mes && d<=dataFim; }).reduce((a,r)=>a+(parseInt(r[3])||0),0);
        const acumC = rows.filter(r => { const d=toDate(r[1]); return r[0]===code && d.getFullYear()===ano && d.getMonth()===mes && d<=dataFim; }).reduce((a,r)=>a+(parseInt(r[4])||0),0);

        // Ano anterior
        const sidAnt = parseInt(String(sid).slice(0,4)-1 + String(sid).slice(4));
        const ant = rows.filter(r=>parseInt(r[6])===sidAnt && r[0]===code).reduce((a,r)=>a+(parseInt(r[3])||0),0);

        const fmt = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        const mesNomes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

        if(!allData[sid]) allData[sid] = {_meta:{ini:fmt(dataIni),fim:fmt(dataFim),mes:mesNomes[mes],ano,sid:parseInt(sid)}};
        allData[sid][code] = {s,c,tot:s.reduce((a,b)=>a+b,0),tot_c:c.reduce((a,b)=>a+b,0),acum,acum_c:acumC,ms,mm,pct:Math.round(acum/mm*1000)/10,ant};
      });
    }

    // Atualiza dados globais
    const validas = Object.keys(allData).map(Number).filter(sid => units.some(c => allData[sid][c]?.tot > 0)).sort((a,b)=>a-b);
    if(validas.length > 0) {
      window.WEEKS_IDS  = validas;
      window.WEEKS_DATA = {};
      validas.forEach(sid => { window.WEEKS_DATA[String(sid)] = allData[sid]; });

      // Recalcula semana atual
      const tSid = getSemanaId(new Date());
      if(!window.WEEKS_IDS.includes(tSid)) {
        window.WEEKS_IDS = [...window.WEEKS_IDS, tSid].sort((a,b)=>a-b);
        const now=new Date(); const dow=now.getDay(); const diff=dow===0?-6:1-dow;
        const seg=new Date(now); seg.setDate(now.getDate()+diff);
        const dom=new Date(seg); dom.setDate(seg.getDate()+6);
        const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        const mes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][seg.getMonth()];
        window.WEEKS_DATA[String(tSid)]={_meta:{ini:fmt(seg),fim:fmt(dom),mes,ano:seg.getFullYear(),sid:tSid}};
      }
      currentIdx = window.WEEKS_IDS.indexOf(tSid);
      if(currentIdx<0) currentIdx = window.WEEKS_IDS.length-1;
      render(currentIdx);

      const now = new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      dataSourceEl.textContent = `SharePoint · atualizado ${now}`;
      dataSourceEl.style.color = 'var(--up)';
    }

  } catch(err) {
    console.error('fetchFreshData:', err);
    dataSourceEl.textContent = `dados locais · erro: ${err.message}`;
    dataSourceEl.style.color = 'var(--down)';
  }
}

fetchFreshData();
</script>
