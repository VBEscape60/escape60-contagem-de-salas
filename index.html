<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escape60">
<meta name="theme-color" content="#0A0A0F">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0F;--s1:#13131A;--border:rgba(255,255,255,0.07);
    --text:#EEEEF5;--muted:#55556E;--up:#3DD68C;--down:#FF4D6D;--warn:#FFD166;
    --hs:#FF6B35;--vo:#4ECDC4;--mo:#FFD166;--tt:#A8E6CF;--jd:#FF8B94;--cp:#C3B1E1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden;max-width:100%;}
  .wrap{max-width:520px;margin:0 auto;padding:18px 14px 36px;overflow-x:hidden;}

  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .logo-img{height:40px;object-fit:contain;}
  .week-nav{display:flex;align-items:center;gap:6px;}
  .nav-btn{background:var(--s1);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .nav-btn:disabled{opacity:.2;cursor:default;}
  .week-info{text-align:right;}
  .week-label{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .week-dates{font-family:'DM Mono',monospace;font-size:.78rem;margin-top:1px;}

  .sec{font-size:.55rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
  .sec::after{content:'';flex:1;height:1px;background:var(--border);}

  /* TABLE */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;}
  table.week{border-collapse:collapse;width:100%;}
  table.week thead tr.hg th{font-size:.52rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0 4px;text-align:center;border-bottom:1px solid var(--border);}
  table.week thead tr.hg th.hl{color:var(--text);}
  table.week thead tr.hd th{font-size:.52rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:5px 3px 8px;text-align:center;}
  table.week thead th:first-child{text-align:left;padding-left:2px;width:36px;}
  .r-s td,.r-c td{text-align:center;font-family:'DM Mono',monospace;font-size:.73rem;padding:2px 3px;}
  .r-s td:first-child{text-align:left;padding-left:2px;}
  .r-c td:first-child{text-align:left;padding-left:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.6rem;}
  .r-s td{border-top:1px solid var(--border);padding-top:9px;}
  .r-c td{padding-bottom:7px;}
  .col-tot{font-weight:700;padding:2px 4px!important;border-left:1px solid rgba(255,255,255,.08);}
  .col-acum{font-weight:500;padding:2px 4px!important;border-right:1px solid rgba(255,255,255,.08);}
  .col-tot.hit{background:rgba(61,214,140,.12);color:#3DD68C;}
  .col-tot.mis{background:rgba(255,77,109,.10);color:#FF6B7A;}
  .col-acum.hit{background:rgba(61,214,140,.09);color:#3DD68C;}
  .col-acum.mis{background:rgba(255,77,109,.08);color:#FF6B7A;}
  .col-msem{color:var(--muted);font-size:.68rem;}.col-mmes{color:var(--muted);font-size:.68rem;}
  .pct{font-weight:700;font-size:.78rem;}
  .pct.ok{color:var(--up);}.pct.mid{color:var(--warn);}.pct.low{color:var(--down);}
  .unit-name{display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.8rem;}
  .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .zero{color:var(--muted);}

  /* CHART */
  .chart-legend{display:flex;gap:14px;margin-bottom:10px;font-size:.6rem;font-family:'DM Mono',monospace;color:var(--muted);}
  .leg{display:flex;align-items:center;gap:5px;}
  .leg-sw{width:16px;height:4px;border-radius:2px;}
  .chart{display:flex;flex-direction:column;gap:9px;}
  .c-row{display:grid;grid-template-columns:30px 1fr 52px;align-items:center;gap:8px;}
  .c-label{display:flex;align-items:center;gap:4px;font-weight:600;font-size:.72rem;}
  .c-bars{position:relative;height:26px;background:var(--s1);border-radius:4px;overflow:hidden;}
  .bar-curr{position:absolute;top:2px;height:10px;border-radius:2px;}
  .bar-prev{position:absolute;top:14px;height:10px;border-radius:2px;opacity:.28;background:#fff!important;}
  .c-vals{text-align:right;font-family:'DM Mono',monospace;font-size:.68rem;line-height:1.6;}
  .c-curr{color:var(--text);}.c-prev{color:var(--muted);}

  /* RECORDS */
  .records{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .rec-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;}
  .rec-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
  .rec-lbl{font-size:.55rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .rec-sub{font-size:.6rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}

  /* HEATMAP */
  .hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.hm{border-collapse:collapse;width:100%;}
  .hm-th-mes{font-size:.55rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 6px 10px 0;min-width:32px;}
  .hm-th-unit{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:0 2px 10px;min-width:42px;}
  .hm-th-geral{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:0 2px 10px;min-width:42px;color:var(--muted);border-left:1px solid var(--border);}
  .hm-td-mes{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);padding:3px 6px 3px 0;vertical-align:middle;white-space:nowrap;}
  .hm-td-mes.cur{color:var(--text);font-weight:600;}
  .hm-cell{text-align:center;padding:3px 2px;vertical-align:middle;}
  .hm-cell-g{text-align:center;padding:3px 2px;vertical-align:middle;border-left:1px solid var(--border);}
  .pip{display:inline-flex;align-items:center;justify-content:center;width:36px;height:32px;border-radius:7px;font-size:.9rem;}
  .pip.hit{background:rgba(61,214,140,.15);color:var(--up);}
  .pip.miss{background:rgba(255,77,109,.10);color:rgba(255,77,109,.45);font-size:.72rem;font-weight:700;}
  .pip.cur{background:rgba(255,255,255,.04);color:var(--muted);font-size:.62rem;outline:1px dashed rgba(255,255,255,.1);outline-offset:2px;}
  .pip.fut{background:transparent;color:transparent;}
  .tr-pct td{border-top:1px solid var(--border);padding-top:10px;}
  .hm-pct-lbl{font-size:.52rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-top:10px;white-space:nowrap;padding-right:6px;}
  .hm-td-pct{text-align:center;padding:8px 2px 4px;}
  .hm-td-pct-g{text-align:center;padding:8px 2px 4px;border-left:1px solid var(--border);}
  .pv{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:700;}
  .pv.ok{color:var(--up);}.pv.mid{color:var(--warn);}.pv.low{color:var(--down);}

  /* LOADING */
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading-overlay{display:flex;position:fixed;inset:0;z-index:9999;background:rgba(10,10,15,.96);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite;}
  #loading-msg{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-align:center;padding:0 32px;}

  footer{text-align:center;margin-top:28px;font-size:.58rem;color:var(--muted);font-family:'DM Mono',monospace;}
</style>

function pctClass(p){return p>=90?'ok':p>=60?'mid':'low';}
function pvClass(p) {return p>=33?'ok':p>=20?'mid':'low';}

function getSemanaId(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  const jan1=new Date(d.getFullYear(),0,1);
  const week=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return d.getFullYear()*100+week;
}

function nearestSid(targetSid){
  if(!window.WEEKS_IDS||!window.WEEKS_IDS.length) return null;
  if(window.WEEKS_IDS.includes(targetSid)) return targetSid;
  for(let i=window.WEEKS_IDS.length-1;i>=0;i--){
    if(window.WEEKS_IDS[i]<=targetSid) return window.WEEKS_IDS[i];
  }
  return window.WEEKS_IDS[window.WEEKS_IDS.length-1];
}

// Meta proporcional: meta_mes / dias_do_mes * dias_já_passados_no_mes
function metaProporcional(metaMes, meta) {
  const hoje = new Date();
  const ano  = meta.ano;
  const mes  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'].indexOf(meta.mes);
  const diasMes   = new Date(ano, mes+1, 0).getDate();
  // dias passados = fim da semana ou hoje (o que for menor)
  const fimSemana = meta.fim; // "dd/mm"
  const [d,mo]    = fimSemana.split('/').map(Number);
  const dataFim   = new Date(ano, mo-1, d);
  const dataHoje  = new Date();
  const dataRef   = dataFim < dataHoje ? dataFim : dataHoje;
  const diasPass  = dataRef.getDate();
  return Math.round(metaMes / diasMes * diasPass);
}

// OAuth2 sem MSAL - usa token do localStorage ou redireciona para login
const TOKEN_KEY = 'e60_graph_token';
const TOKEN_EXP = 'e60_graph_token_exp';

function getStoredToken() {
  const token = localStorage.getItem(TOKEN_KEY);
  const exp   = parseInt(localStorage.getItem(TOKEN_EXP) || '0');
  if(token && Date.now() < exp) return token;
  return null;
}

function loginMicrosoft() {
  const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
  const scope = encodeURIComponent('Files.Read Sites.Read.All User.Read');
  const url = `https://login.microsoftonline.com/8c401f2f-30a2-4159-9e83-b7a9d2bbcee0/oauth2/v2.0/authorize`
    + `?client_id=5316ae6b-b5b0-4d3c-8d01-207aa3a052d4`
    + `&response_type=token`
    + `&redirect_uri=${redirectUri}`
    + `&scope=${scope}`
    + `&response_mode=fragment`;
  window.location.href = url;
}

// Captura token do hash da URL após redirect do login
function captureTokenFromHash() {
  const hash = window.location.hash.substring(1);
  if(!hash) return false;
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const expiresIn = parseInt(params.get('expires_in') || '3600');
  if(token) {
    localStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(TOKEN_EXP, String(Date.now() + expiresIn * 1000));
    // Limpa o hash da URL
    history.replaceState(null, '', window.location.pathname);
    return true;
  }
  return false;
}

        const mes = dataIni.getMonth();
        const ano = dataIni.getFullYear();
        const diasMes = new Date(ano, mes+1, 0).getDate();
        const mm = metaFixa[code];
        const ms = Math.round(mm/diasMes*7*10)/10;

        // Acumulado do mês
        const acum  = rows.filter(r => { const d=toDate(r[1]); return r[0]===code && d.getFullYear()===ano && d.getMonth()===mes && d<=dataFim; }).reduce((a,r)=>a+(parseInt(r[3])||0),0);
        const acumC = rows.filter(r => { const d=toDate(r[1]); return r[0]===code && d.getFullYear()===ano && d.getMonth()===mes && d<=dataFim; }).reduce((a,r)=>a+(parseInt(r[4])||0),0);

        // Ano anterior
        const sidAnt = parseInt(String(sid).slice(0,4)-1 + String(sid).slice(4));
        const ant = rows.filter(r=>parseInt(r[6])===sidAnt && r[0]===code).reduce((a,r)=>a+(parseInt(r[3])||0),0);

        const fmt = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        const mesNomes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

        if(!allData[sid]) allData[sid] = {_meta:{ini:fmt(dataIni),fim:fmt(dataFim),mes:mesNomes[mes],ano,sid:parseInt(sid)}};
        allData[sid][code] = {s,c,tot:s.reduce((a,b)=>a+b,0),tot_c:c.reduce((a,b)=>a+b,0),acum,acum_c:acumC,ms,mm,pct:Math.round(acum/mm*1000)/10,ant};
      });
    }

    // Atualiza dados globais
    const validas = Object.keys(allData).map(Number).filter(sid => units.some(c => allData[sid][c]?.tot > 0)).sort((a,b)=>a-b);
    if(validas.length > 0) {
      window.WEEKS_IDS  = validas;
      window.WEEKS_DATA = {};
      validas.forEach(sid => { window.WEEKS_DATA[String(sid)] = allData[sid]; });

      // Recalcula semana atual
      const tSid = getSemanaId(new Date());
      if(!window.WEEKS_IDS.includes(tSid)) {
        window.WEEKS_IDS = [...window.WEEKS_IDS, tSid].sort((a,b)=>a-b);
        const now=new Date(); const dow=now.getDay(); const diff=dow===0?-6:1-dow;
        const seg=new Date(now); seg.setDate(now.getDate()+diff);
        const dom=new Date(seg); dom.setDate(seg.getDate()+6);
        const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        const mes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][seg.getMonth()];
        window.WEEKS_DATA[String(tSid)]={_meta:{ini:fmt(seg),fim:fmt(dom),mes,ano:seg.getFullYear(),sid:tSid}};
      }
      currentIdx = window.WEEKS_IDS.indexOf(tSid);
      if(currentIdx<0) currentIdx = window.WEEKS_IDS.length-1;
      render(currentIdx);

      const now = new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      dataSourceEl.textContent = `SharePoint · atualizado ${now}`;
      dataSourceEl.style.color = 'var(--up)';
    }

  } catch(err) {
    console.error('fetchFreshData:', err);
    const msg = err?.message || err?.errorCode || err?.name || JSON.stringify(err) || 'desconhecido';
    dataSourceEl.textContent = `erro: ${msg}`;
    dataSourceEl.style.color = 'var(--down)';
    dataSourceEl.style.cursor = 'pointer';
    dataSourceEl.title = JSON.stringify(err);
    // Toque para ver detalhes
    dataSourceEl.onclick = () => alert('Erro detalhado:\n' + JSON.stringify(err, null, 2));
  }
}

fetchFreshData();
</script>
