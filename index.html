  --bg:#0A0A0F;--s1:#13131A;--border:rgba(255,255,255,0.07);
  --text:#EEEEF5;--muted:#55556E;--up:#3DD68C;--down:#FF4D6D;--warn:#FFD166;
  --hs:#FF6B35;--vo:#4ECDC4;--mo:#FFD166;--tt:#A8E6CF;--jd:#FF8B94;--cp:#C3B1E1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden;max-width:100%;}
.wrap{max-width:520px;margin:0 auto;padding:18px 14px 36px;overflow-x:hidden;}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.logo-img{height:40px;object-fit:contain;}
.week-nav{display:flex;align-items:center;gap:6px;}
.nav-btn{background:var(--s1);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:disabled{opacity:.2;cursor:default;}
.week-info{text-align:right;}
.week-label{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.week-dates{font-family:'DM Mono',monospace;font-size:.78rem;margin-top:1px;}

.sec{font-size:.55rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* TABELA */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;}
table.week{border-collapse:collapse;width:100%;}
table.week thead tr.hg th{font-size:.52rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0 4px;text-align:center;border-bottom:1px solid var(--border);}
table.week thead tr.hg th.hl{color:var(--text);}
table.week thead tr.hd th{font-size:.5rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:4px 2px 7px;text-align:center;}
table.week thead th:first-child{text-align:left;padding-left:2px;width:36px;}
.r-s td,.r-c td{text-align:center;font-family:'DM Mono',monospace;font-size:.65rem;padding:2px 2px;}
.r-s td:first-child{text-align:left;padding-left:2px;}
.r-c td:first-child{text-align:left;padding-left:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.6rem;}
.r-s td{border-top:1px solid var(--border);padding-top:9px;}
.r-c td{padding-bottom:7px;}
.col-tot{font-weight:700;}
.col-tot.hit{background:rgba(61,214,140,.12);color:var(--up);border-radius:4px;}
.col-tot.mis{background:rgba(255,77,109,.10);color:#FF6B7A;border-radius:4px;}
.col-acum{color:#ccc;font-weight:500;}
.col-acum.hit{background:rgba(61,214,140,.09);color:var(--up);border-radius:4px;}
.col-acum.mis{background:rgba(255,77,109,.08);color:#FF6B7A;border-radius:4px;}
.col-msem{color:var(--muted);font-size:.62rem;}
.col-mmes{color:var(--muted);font-size:.62rem;}
.pct{font-weight:700;font-size:.75rem;}
.pct.ok{color:var(--up);}.pct.mid{color:var(--warn);}.pct.low{color:var(--down);}
.unit-name{display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.78rem;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.zero{color:var(--muted);}

/* RECORDES */
.records{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.rec-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;}
.rec-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
.rec-lbl{font-size:.55rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.rec-sub{font-size:.6rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}

/* HEATMAP */
.hm-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.hm{border-collapse:collapse;width:100%;}
.hm-th-mes{font-size:.55rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 6px 10px 0;min-width:32px;}
.hm-th-unit{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:0 2px 10px;min-width:42px;}
.hm-th-geral{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:0 2px 10px;min-width:42px;color:var(--muted);border-left:1px solid var(--border);}
.hm-td-mes{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);padding:3px 6px 3px 0;vertical-align:middle;white-space:nowrap;}
.hm-td-mes.cur{color:var(--text);font-weight:600;}
.hm-cell{text-align:center;padding:3px 2px;vertical-align:middle;}
.hm-cell-g{text-align:center;padding:3px 2px;vertical-align:middle;border-left:1px solid var(--border);}
.pip{display:inline-flex;align-items:center;justify-content:center;width:36px;height:32px;border-radius:7px;font-size:.9rem;}
.pip.hit{background:rgba(61,214,140,.15);color:var(--up);}
.pip.miss{background:rgba(255,77,109,.10);color:rgba(255,77,109,.45);font-size:.72rem;font-weight:700;}
.pip.cur{background:rgba(255,255,255,.04);color:var(--muted);font-size:.62rem;outline:1px dashed rgba(255,255,255,.1);outline-offset:2px;}
.pip.fut{background:transparent;color:transparent;}
.tr-pct td{border-top:1px solid var(--border);padding-top:10px;}
.hm-pct-lbl{font-size:.52rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-top:10px;white-space:nowrap;padding-right:6px;}
.hm-td-pct{text-align:center;padding:8px 2px 4px;}
.hm-td-pct-g{text-align:center;padding:8px 2px 4px;border-left:1px solid var(--border);}
.pv{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:700;}
.pv.ok{color:var(--up);}.pv.mid{color:var(--warn);}.pv.low{color:var(--down);}

/* LOADING */
@keyframes spin{to{transform:rotate(360deg)}}
#lo{display:flex;position:fixed;inset:0;z-index:9999;background:rgba(10,10,15,.96);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite;}
#lm{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-align:center;padding:0 32px;}
footer{text-align:center;margin-top:28px;font-size:.58rem;color:var(--muted);font-family:'DM Mono',monospace;}
#ds{text-align:center;font-size:.58rem;font-family:'DM Mono',monospace;margin-top:8px;cursor:pointer;}
</style>
</head>

function getToken(){
  const t=localStorage.getItem(TOKEN_KEY),e=parseInt(localStorage.getItem(TOKEN_EXP)||'0');
  return(t&&Date.now()<e)?t:null;
}
function loginMS(){
  const r=encodeURIComponent(window.location.origin+window.location.pathname);
  const s=encodeURIComponent(SCOPES);
  window.location.href=`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${r}&scope=${s}&response_mode=fragment`;
}
function captureToken(){
  const hash=window.location.hash.substring(1);
  if(!hash) return false;
  const p=new URLSearchParams(hash);
  const t=p.get('access_token');
  if(t){
    localStorage.setItem(TOKEN_KEY,t);
    localStorage.setItem(TOKEN_EXP,String(Date.now()+parseInt(p.get('expires_in')||'3600')*1000));
    history.replaceState(null,'',window.location.pathname);
    return true;
  }
  return false;
}

function parseRSBlock(values, dateRow, dataRow){
  // dateRow and dataRow are 0-based indices in values array
  const dates=values[dateRow];
  function toDate(serial){
    if(!serial||isNaN(serial)) return null;
    const d=new Date(Math.round((serial-25569)*86400*1000));
    return d;
  }
  const dataIni=toDate(dates[2]);
  const dataFim=toDate(dates[8]);
  if(!dataIni) return null;
  
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const mes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][dataIni.getMonth()];
  const ano=dataIni.getFullYear();
  const seg=new Date(dataIni); seg.setDate(dataIni.getDate()-((dataIni.getDay()||7)-1));
  const jan1=new Date(seg.getFullYear(),0,1);
  const week=Math.ceil(((seg-jan1)/86400000+jan1.getDay()+1)/7);
  const semId=seg.getFullYear()*100+week;
  
  // unit order: HS=0, VO=2, CP=4, MO=6, TT=8, JD=10
  const unitMap=[['HS',0],['VO',2],['CP',4],['MO',6],['TT',8],['JD',10]];
  const result={_meta:{ini:fmt(dataIni),fim:fmt(dataFim||dataIni),mes,ano,sid:semId}};
  
  unitMap.forEach(([u,off])=>{
    const sr=values[dataRow+off]||[];
    const cr=values[dataRow+off+1]||[];
    const iv=v=>{try{return parseInt(v)||0;}catch{return 0;}};
    const fv=v=>{try{const n=parseFloat(v);return n>0?n:0;}catch{return 0;}};
    const s=[2,3,4,5,6,7,8].map(i=>iv(sr[i]));
    const c=[2,3,4,5,6,7,8].map(i=>iv(cr[i]));
    const tot=iv(sr[9])||s.reduce((a,b)=>a+b,0);
    const tot_c=iv(cr[9]);
    const acum=iv(sr[10]);
    const acum_c=iv(cr[10]);
    const mm=fv(sr[11]);
    const diasMes=new Date(ano,dataIni.getMonth()+1,0).getDate();
    const ms=mm>0?Math.round(mm/diasMes*7*10)/10:0;
    const pct=mm>0?Math.round(acum/mm*1000)/10:0;
    result[u]={s,c,tot,tot_c,acum,acum_c,ms,mm:Math.round(mm),pct};
  });
  return{semId,result};
}

    // Lê só o Resumo Semanal — 1 requisição!
    const r2=await fetch(
      `https://graph.microsoft.com/v1.0/drives/${driveId}/items/${itemId}/workbook/worksheets('Resumo Semanal')/range(address='A1:U98')`,
      {headers:{Authorization:`Bearer ${token}`}}
    );
    if(!r2.ok) throw new Error(`RS: ${r2.status}`);
    const d2=await r2.json();
    const v=d2.values;
    
    // Parse 3 blocos
    // Bloco atual: linha 1=titulo, linha 2=datas(idx1), dados idx2
    // Bloco -7: linha 20=titulo+datas(idx19), dados idx20
    // Bloco -14: linha 37=titulo+datas(idx36), dados idx37
    console.log('Total linhas:', v.length, 'Total cols:', v[0]?.length);
    console.log('L2 (datas):', v[1]?.slice(0,12));
    console.log('L3 (HS):', v[2]?.slice(0,12));
    console.log('L20 (-7):', v[19]?.slice(0,12));
    console.log('L37 (-14):', v[36]?.slice(0,12));
    const b0=parseRSBlock(v,1,2);
    const b1=parseRSBlock(v,19,20);
    const b2=parseRSBlock(v,36,37);
    console.log('b0:', b0?.semId, b0?.result?.HS?.tot);
    console.log('b1:', b1?.semId, b1?.result?.HS?.tot);
    console.log('b2:', b2?.semId, b2?.result?.HS?.tot);
    
    const newIds=[],newData={};
    [b0,b1,b2].forEach(b=>{
      if(b){newIds.push(b.semId);newData[String(b.semId)]=b.result;}
    });
    newIds.sort((a,b)=>a-b);
    
    // Garante semana atual
    const tSid=getSemanaId(new Date());
    if(!newIds.includes(tSid)){
      newIds.push(tSid);
      newIds.sort((a,b)=>a-b);
      const now=new Date(),dow=now.getDay(),diff=dow===0?-6:1-dow;
      const seg=new Date(now); seg.setDate(now.getDate()+diff);
      const dom=new Date(seg); dom.setDate(seg.getDate()+6);
      const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      const mesL=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][seg.getMonth()];
      newData[String(tSid)]={_meta:{ini:fmt(seg),fim:fmt(dom),mes:mesL,ano:seg.getFullYear(),sid:tSid}};
    }
    
    // Acompanhamento metas calculado automaticamente via faturamento vs meta
    // (atualiza quando faturamento do mês for maior que a meta)
    const anoAtual=new Date().getFullYear();
    const mesAtual=new Date().getMonth()+1;
    if(METAS_ACMP[anoAtual]){
      for(let i=0;i<12;i++){
        const m=i+1;
        if(m>=mesAtual){ break; } // mês atual e futuros = null (em andamento)
        const unitCols={MO:2,VO:3,HS:4,TT:5,JD:6,CP:7};
        let geralBat=true;
        Object.entries(unitCols).forEach(([u,c])=>{
          const fatVal=parseFloat(v[55+i]?.[c]||0);
          const metaVal=parseFloat(v[69+i]?.[c]||0);
          const bateu=metaVal>0&&fatVal>=metaVal?1:0;
          METAS_ACMP[anoAtual][i][u]=bateu;
          if(!bateu) geralBat=false;
        });
        METAS_ACMP[anoAtual][i].G=geralBat?1:0;
      }
    }
    
    // Atualiza % anual com faturamento real (linhas 56-67=idx55-66) e metas (70-81=idx69-80)
    const unitFatCols={MO:2,VO:3,HS:4,TT:5,JD:6,CP:7};
    const newPct={};
    Object.entries(unitFatCols).forEach(([u,c])=>{
      let fatAcum=0,metaAno=0;
      for(let i=0;i<12;i++){
        const fv=parseFloat(v[55+i]?.[c]||0); if(fv>0) fatAcum+=fv;
        const mv=parseFloat(v[69+i]?.[c]||0); if(mv>0) metaAno+=mv;
      }
      newPct[u]=metaAno>0?Math.round(fatAcum/metaAno*1000)/10:0;
    });
    Object.assign(PCT_ANO,newPct);
    
    // Merge: só atualiza semanas com dados válidos, mantém estáticos para o resto
    let updated=false;
    newIds.forEach(sid=>{
      const d=newData[String(sid)];
      if(d && Object.keys(d).length>1){
        // Verifica se tem pelo menos 1 unidade com tot>0
        const hasUnits=['HS','VO','MO','TT','JD','CP'].some(u=>d[u]&&(d[u].tot>0||d[u].acum>0));
        if(hasUnits||true){ // aceita mesmo sem dados (semana atual pode estar vazia)
          window.WD[String(sid)]=d;
          if(!window.WI.includes(sid)) window.WI.push(sid);
          updated=true;
        }
      }
    });
    if(updated){
      window.WI.sort((a,b)=>a-b);
      currentIdx=window.WI.indexOf(tSid);
      if(currentIdx<0) currentIdx=window.WI.length-1;
      render(currentIdx);
    }
    
    const now2=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    ds.textContent=`SharePoint · ${now2}`;
    ds.style.color='var(--up)';
  }catch(err){
    console.error(err);
    ds.textContent=`erro: ${err.message}`;
    ds.style.color='var(--down)';
    ds.onclick=()=>alert(err.message);
  }
}

// Nav
document.getElementById('btn-prev').onclick=()=>{if(currentIdx>0){currentIdx--;render(currentIdx);}};
document.getElementById('btn-next').onclick=()=>{if(currentIdx<window.WI.length-1){currentIdx++;render(currentIdx);}};

// Init
const tSid=getSemanaId(new Date());
if(!window.WI.includes(tSid)){
  window.WI=[...window.WI,tSid].sort((a,b)=>a-b);
  const now=new Date(),dow=now.getDay(),diff=dow===0?-6:1-dow;
  const seg=new Date(now); seg.setDate(now.getDate()+diff);
  const dom=new Date(seg); dom.setDate(seg.getDate()+6);
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const mesL=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][seg.getMonth()];
  window.WD[String(tSid)]={_meta:{ini:fmt(seg),fim:fmt(dom),mes:mesL,ano:seg.getFullYear(),sid:tSid}};
}
currentIdx=window.WI.indexOf(tSid);
if(currentIdx<0) currentIdx=window.WI.length-1;
document.getElementById('lo').style.display='none';
render(currentIdx);
fetchFreshData();
</script>
